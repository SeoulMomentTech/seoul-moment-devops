AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready ECR and RDS Infrastructure - Cost Optimized (Single-AZ)'

Parameters:
  ProjectName:
    Type: String
    Default: 'seoul-moment'
    Description: '이전에 만든 네트워크 스택의 ProjectName과 동일해야 합니다.'

Resources:
  # ========== 1. CloudWatch 로그 그룹 (비용 절감: 3일 보관) ==========
  RDSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/rds/instance/${ProjectName}-db-prod/postgresql'
      RetentionInDays: 3

  # ========== 2. ECR REPOSITORIES (이미지 창고) ==========
  ECRRepositoryAPI:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}-api'
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "최근 5개 이미지만 남기고 삭제",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ========== 3. SECRETS MANAGER (DB 비밀번호 금고) ==========
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/rds/credentials-prod'
      Description: !Sub 'Production RDS credentials for ${ProjectName}'
      GenerateSecretString:
        # 🌟 username을 seoul로 변경했습니다!
        SecretStringTemplate: '{"username": "seoul"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  # ========== 4. RDS CONFIGURATION ==========
  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: 'Cost-optimized parameters'
      Family: postgres13
      Parameters:
        log_statement: 'ddl'
        log_min_duration_statement: '2000'

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Production DB Subnet Group'
      SubnetIds:
        - !ImportValue { "Fn::Sub": "${ProjectName}-PrivateSubnet1-ID" }
        - !ImportValue { "Fn::Sub": "${ProjectName}-PrivateSubnet2-ID" }

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-db-prod'
      DBName: 'seoul_moment'
      Engine: postgres
      EngineVersion: '13.20'
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: 20
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: false
      DeletionProtection: true
      PubliclyAccessible: false
      EnableCloudwatchLogsExports:
        - 'postgresql'
      VPCSecurityGroups:
        - !ImportValue { "Fn::Sub": "${ProjectName}-DatabaseSG-ID" }
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref DBParameterGroup
      MasterUsername: !Join [ "", [ "{{resolve:secretsmanager:", !Ref DBSecret, ":SecretString:username}}" ] ]
      MasterUserPassword: !Join [ "", [ "{{resolve:secretsmanager:", !Ref DBSecret, ":SecretString:password}}" ] ]
      BackupRetentionPeriod: 7
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSEnhancedMonitoringRole.Arn

  RDSEnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: monitoring.rds.amazonaws.com }
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole'

Outputs:
  RDSEndpoint:
    Description: 'RDS Connection Endpoint'
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub '${ProjectName}-RDS-Endpoint'

  ECRRepoAPI:
    Description: 'ECR API Repository URI'
    Value: !GetAtt ECRRepositoryAPI.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-ECR-API-URI'